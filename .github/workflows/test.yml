name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04

    services:
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/boltex_nif_pass
          NEO4J_server_memory_pagecache_size: 256M
          NEO4J_server_memory_heap_initial__size: 256M
          NEO4J_server_memory_heap_max__size: 512M
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p boltex_nif_pass 'RETURN 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 60s

    strategy:
      fail-fast: false
      matrix:
        include:
          - { otp: "27.3", elixir: "1.19.4" }

    env:
      MIX_ENV: test
      FORCE_BOLTEX_BUILD: "1"
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: boltex_nif_pass

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81"

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/boltex_nif/target
          key: cargo-${{ hashFiles('native/boltex_nif/Cargo.lock', 'native/boltex_nif/Cargo.toml') }}
          restore-keys: cargo-

      - name: Install deps
        run: mix deps.get

      - name: Compile (warnings-as-errors)
        run: mix compile --warnings-as-errors

      - name: Run tests (incl. live)
        run: mix test --include live

  test_phoenix:
    name: Phoenix demo app tests
    runs-on: ubuntu-22.04
    needs: test

    services:
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/boltex_nif_pass
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p boltex_nif_pass 'RETURN 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 60s

    env:
      MIX_ENV: test
      FORCE_BOLTEX_BUILD: "1"
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: boltex_nif_pass

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3"
          elixir-version: "1.19.4"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.81"

      - name: Install deps
        working-directory: phoenix_neo4j
        run: mix deps.get

      - name: Compile
        working-directory: phoenix_neo4j
        run: mix compile --warnings-as-errors

      - name: Test Phoenix app
        working-directory: phoenix_neo4j
        run: mix test --include live
