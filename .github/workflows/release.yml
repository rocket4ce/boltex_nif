name: Build precompiled NIFs

# Only triggered by tag pushes that match `v*` (e.g. `v0.1.0`, `v1.2.3-rc1`).
# Nothing else — no branch pushes, no PRs, no manual dispatch — so the
# matrix and the GitHub Release upload only run when you're actually
# cutting a release.
on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C debuginfo=none

jobs:
  build_release:
    name: ${{ matrix.job.target }} (NIF ${{ matrix.nif }})
    runs-on: ${{ matrix.job.os }}
    # `softprops/action-gh-release` needs write access to repository contents
    # to create/edit the release and upload assets. Default permission for
    # GITHUB_TOKEN is `contents: read`, which is why v0.1.0 first failed with
    # "Resource not accessible by integration".
    permissions:
      contents: write
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        nif: ["2.17", "2.16"]
        # musl targets are intentionally dropped for v0.1.0 because the
        # default `cross` Docker images can't emit `cdylib` on musl without
        # a per-target `Cross.toml` + `RUSTFLAGS="-C target-feature=-crt-static"`.
        # Alpine / scratch users can install with `FORCE_BOLTEX_BUILD=1`.
        # Re-introduce once we ship a Cross.toml tested for the matrix.
        job:
          # Both macOS targets run on `macos-14` (Apple silicon). The Intel
          # target is cross-compiled — Xcode on the ARM runner ships a
          # universal SDK, and `rustup target add x86_64-apple-darwin`
          # provides the Rust std. This dodges the slow/scarce `macos-13`
          # (Intel) runner queue that GitHub keeps shrinking.
          - { target: aarch64-apple-darwin,      os: macos-14 }
          - { target: x86_64-apple-darwin,       os: macos-14 }
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-22.04 }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }
          - { target: x86_64-pc-windows-msvc,    os: windows-2022 }

    steps:
      - uses: actions/checkout@v4

      - name: Read project version from mix.exs
        id: version
        run: |
          # Extract the `@version "X.Y.Z"` module attribute. This is the
          # single source of truth referenced by `version: @version` in the
          # project/0 function, so grepping the attribute is more robust
          # than grepping the keyword list (which can legitimately say
          # `version: @version,` — no quoted string to match).
          VERSION=$(grep -E '^\s*@version\s+"' mix.exs | head -n1 \
            | sed -E 's/.*@version[[:space:]]+"([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract @version from mix.exs"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Project version: $VERSION"

      - name: Build the NIF
        id: build
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: boltex_nif
          project-version: ${{ steps.version.outputs.version }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          project-dir: native/boltex_nif

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.file-name }}
          path: ${{ steps.build.outputs.file-path }}

      - name: Publish archive to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.build.outputs.file-path }}

  verify_matrix:
    name: Verify all targets built
    needs: build_release
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: |
          echo "Artifacts present:"
          find artifacts -type f -name '*.tar.gz' | sort
          count=$(find artifacts -type f -name '*.tar.gz' | wc -l)
          expected=10   # 5 targets × 2 NIF versions
          if [ "$count" -ne "$expected" ]; then
            echo "::error::Expected $expected artifacts, found $count"
            exit 1
          fi
