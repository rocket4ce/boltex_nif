x-neo4j-env: &neo4j-env
  NEO4J_AUTH: "neo4j/${CFG_NEO4J_PASSWORD:?CFG_NEO4J_PASSWORD must be set in Coolify}"

  NEO4J_server_default__listen__address: 0.0.0.0
  NEO4J_server_default__advertised__address: "${SERVICE_FQDN_NEO4J:-localhost}"
  NEO4J_server_bolt_listen__address: ":7687"
  NEO4J_server_bolt_advertised__address: "${SERVICE_FQDN_NEO4J:-localhost}:7687"
  NEO4J_server_http_listen__address: ":7474"
  NEO4J_server_http_advertised__address: "${SERVICE_FQDN_NEO4J:-localhost}:7474"
  NEO4J_server_https_enabled: "false"

  NEO4J_server_memory_pagecache_size: "${CFG_PAGECACHE:-1G}"
  NEO4J_server_memory_heap_initial__size: "${CFG_HEAP_INITIAL:-1G}"
  NEO4J_server_memory_heap_max__size: "${CFG_HEAP_MAX:-2G}"
  NEO4J_server_jvm_additional: "-XX:+ExitOnOutOfMemoryError -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/logs/heap.hprof"

  NEO4J_initial_dbms_default__database: "${CFG_DEFAULT_DB:-neo4j}"
  NEO4J_db_transaction_timeout: "${CFG_TX_TIMEOUT:-120s}"
  NEO4J_db_lock_acquisition_timeout: "${CFG_LOCK_TIMEOUT:-60s}"

  NEO4J_PLUGINS: '${CFG_PLUGINS_JSON:-["apoc"]}'
  NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*,n10s.*"
  NEO4J_dbms_security_procedures_allowlist: "apoc.*,gds.*,n10s.*"
  NEO4J_apoc_import_file_enabled: "true"
  NEO4J_apoc_export_file_enabled: "true"
  NEO4J_apoc_import_file_use__neo4j__config: "true"

  NEO4J_db_logs_query_enabled: "${CFG_QUERY_LOG:-INFO}"
  NEO4J_db_logs_query_threshold: "${CFG_QUERY_LOG_THRESHOLD:-500ms}"
  NEO4J_db_logs_query_parameter__logging__enabled: "true"

  NEO4J_server_config_strict__validation_enabled: "false"

services:
  neo4j:
    image: neo4j:${CFG_VERSION:-5.26-community}
    container_name: ${COMPOSE_PROJECT_NAME:-boltex}_neo4j
    environment:
      <<: *neo4j-env
      SERVICE_FQDN_NEO4J: ""
      SERVICE_FQDN_NEO4J_7474: ""

    ports:
      - "${CFG_HTTP_PORT:-7474}:7474"
      - "${CFG_BOLT_PORT:-7687}:7687"
      - "127.0.0.1:${CFG_METRICS_PORT:-2004}:2004"

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_conf:/conf

    healthcheck:
      test:
        - CMD-SHELL
        - cypher-shell -u neo4j -p '${CFG_NEO4J_PASSWORD}' -a bolt://localhost:7687 'RETURN 1' >/dev/null 2>&1 || exit 1
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

    ulimits:
      nofile:
        soft: 40000
        hard: 40000

    deploy:
      resources:
        limits:
          memory: "${CFG_CONTAINER_MEMORY:-4G}"
        reservations:
          memory: "${CFG_CONTAINER_MEMORY_RESERVATION:-2G}"

    restart: unless-stopped
    labels:
      coolify.managed: "true"
      coolify.name: "neo4j"

  neo4j_backup:
    image: neo4j:${CFG_VERSION:-5.26-community}
    container_name: ${COMPOSE_PROJECT_NAME:-boltex}_neo4j_backup
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      CFG_NEO4J_PASSWORD: "${CFG_NEO4J_PASSWORD:?CFG_NEO4J_PASSWORD must be set in Coolify}"
      CFG_BACKUP_INTERVAL_SECONDS: "${CFG_BACKUP_INTERVAL_SECONDS:-86400}"
      CFG_BACKUP_RETENTION_DAYS: "${CFG_BACKUP_RETENTION_DAYS:-14}"
    volumes:
      - neo4j_backups:/backups
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -eu
        mkdir -p /backups
        touch /tmp/backup_alive
        echo "[boot] backup loop starting; interval=$${CFG_BACKUP_INTERVAL_SECONDS}s retention=$${CFG_BACKUP_RETENTION_DAYS}d"
        while true; do
          ts=$$(date -u +%Y%m%dT%H%M%SZ)
          out="/backups/neo4j-$$ts.cypher"
          echo "[$$ts] dumping to $$out"
          if cypher-shell \
               -u neo4j -p "$$CFG_NEO4J_PASSWORD" \
               -a "bolt://neo4j:7687" \
               --format plain \
               "CALL apoc.export.cypher.all(null, {stream:true, format:'cypher-shell'}) YIELD cypherStatements RETURN cypherStatements" \
               > "$$out" 2>&1; then
            gzip -f "$$out"
            echo "[$$ts] ok → $$out.gz ($$(du -h "$$out.gz" | cut -f1))"
          else
            echo "[$$ts] FAILED (see output above)"
            rm -f "$$out"
          fi
          find /backups -name 'neo4j-*.cypher.gz' -mtime +$${CFG_BACKUP_RETENTION_DAYS} -print -delete || true
          touch /tmp/backup_alive
          sleep "$${CFG_BACKUP_INTERVAL_SECONDS}"
        done
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/backup_alive"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    labels:
      coolify.managed: "true"
      coolify.name: "neo4j-backup"

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  neo4j_import:
  neo4j_conf:
  neo4j_backups:
